version: '3.8'

services:
  llm-wiki:
    build: .
    container_name: llm-wiki
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # 从.env文件加载环境变量
      - PORT=${PORT:-3001}
      - NODE_ENV=${NODE_ENV:-production}
      - WIKI_ROOT=${WIKI_ROOT:-/app/wiki-data}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
    volumes:
      # 挂载wiki-data目录，确保数据持久化
      - ./wiki-data:/app/wiki-data
      # 可选：挂载日志目录
      # - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/wiki/status"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - llm-wiki-network
    # 资源限制（可选）
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 1G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M

networks:
  llm-wiki-network:
    driver: bridge

